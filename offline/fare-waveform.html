<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="運賃波形" />
  <title>運賃波形（オフライン）</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f5f5f5;
      --card: #fff;
      --text: #2c3e50;
      --muted: #7f8c8d;
      --accent: #3498db;
      --border: #e0e0e0;
      --banner: #fef9e7;
      --banner-border: #f5cba7;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --card: #2d2d2d;
        --text: #ecf0f1;
        --muted: #95a5a6;
        --border: #444;
        --banner: #3d3520;
        --banner-border: #6b5a2e;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 12px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }
    h1 { font-size: 1.25rem; margin: 0 0 4px; }
    .sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 12px; }
    .offline-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      color: #27ae60;
      background: rgba(39, 174, 96, 0.12);
      padding: 2px 8px;
      border-radius: 999px;
      margin-left: 8px;
      vertical-align: middle;
    }
    .card {
      background: var(--card);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      text-align: center;
      margin-bottom: 12px;
    }
    .metric-val { font-size: 1.1rem; font-weight: 700; min-height: 1.5em; }
    .metric-val.peak { color: #f39c12; }
    .metric-lbl { font-size: 0.65rem; color: var(--muted); line-height: 1.3; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .chip {
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      border-radius: 16px;
      padding: 6px 12px;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }
    .lbl { font-size: 0.7rem; font-weight: 600; margin-bottom: 4px; }
    .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
    .legend-panel {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 8px;
      background: var(--bg);
    }
    .overlay-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      font-size: 0.7rem;
    }
    .overlay-chip {
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 12px;
      padding: 3px 8px;
      font-size: 0.65rem;
      cursor: pointer;
    }
    .overlay-chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }
    .time-select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 0.8rem;
      margin-bottom: 8px;
    }
    .exit-peaks {
      margin-top: 8px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
    }
    .exit-peaks-title { font-size: 0.7rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
    .exit-peaks-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .exit-peak-item {
      flex: 1 1 46%;
      min-width: 120px;
      padding: 6px 8px;
      border-radius: 6px;
      background: var(--card);
      border: 1px solid var(--border);
      font-size: 0.75rem;
    }
    .exit-peak-time { font-size: 0.95rem; font-weight: 700; color: #f39c12; }
    .exit-peak-fare { font-size: 0.65rem; color: var(--muted); }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      opacity: 1;
    }
    .legend-item.off { opacity: 0.45; }
    .dot { width: 12px; height: 12px; border-radius: 2px; border: 2px solid; }
    .chart-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      min-height: 300px;
    }
    .error-box {
      background: #fadbd8;
      color: #c0392b;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 0.85rem;
      white-space: pre-wrap;
    }
    .banner {
      background: var(--banner);
      border: 1px solid var(--banner-border);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
      font-size: 0.8rem;
    }
    .banner-title { font-weight: 700; margin-bottom: 6px; }
    .banner-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .banner-item { display: flex; align-items: center; gap: 6px; }
    .banner-dot { width: 10px; height: 10px; border-radius: 50%; }
    svg { display: block; }
  </style>
</head>
<body>
  <h1>運賃波形<span class="offline-badge">オフライン</span></h1>
  <p class="sub" id="subtitle">PC・ネットワーク不要で表示</p>

  <div id="error-box" class="error-box" hidden></div>
  <div class="metrics card" id="metrics"></div>
  <div class="banner" id="airport-banner" hidden></div>

  <div class="card">
    <div class="lbl">駅</div>
    <div class="chips" id="station-chips"></div>
    <div class="lbl">曜日</div>
    <div class="chips" id="day-chips"></div>
    <div class="lbl">時間帯</div>
    <select class="time-select" id="preset-select" aria-label="時間帯"></select>
    <div class="legend-panel">
      <div class="legend" id="legend"></div>
      <div class="overlay-row" id="overlay-row"></div>
    </div>
    <div class="chart-scroll" id="chart-scroll"></div>
    <div class="exit-peaks" id="exit-peaks" hidden></div>
    <p class="sub" style="margin: 8px 0 0">左軸: max(鉄道運賃) · 破線: 収容人数 · RCI未実装</p>
  </div>

  <script>
    function showError(message) {
      const box = document.getElementById('error-box');
      box.hidden = false;
      box.textContent = message;
    }

    function themeColors() {
      const root = getComputedStyle(document.documentElement);
      return {
        border: root.getPropertyValue('--border').trim() || '#e0e0e0',
        muted: root.getPropertyValue('--muted').trim() || '#7f8c8d',
        plotFill: root.getPropertyValue('--card').trim() || '#ffffff',
      };
    }

    function seriesMax(values, floor) {
      let max = floor;
      for (let i = 0; i < values.length; i++) {
        if (values[i] > max) max = values[i];
      }
      return max;
    }

    function buildPolylinePoints(values, xAt, yAt, indices) {
      const parts = [];
      const use = indices || values.map((_, i) => i);
      for (let k = 0; k < use.length; k++) {
        const i = use[k];
        parts.push(`${xAt(i)},${yAt(values[i])}`);
      }
      return parts.join(' ');
    }

    function pickIndices(slotCount, maxPoints) {
      if (slotCount <= maxPoints) return null;
      const step = slotCount / maxPoints;
      const indices = [];
      for (let i = 0; i < slotCount; i += step) {
        indices.push(Math.floor(i));
      }
      if (indices[indices.length - 1] !== slotCount - 1) {
        indices.push(slotCount - 1);
      }
      return indices;
    }

    let meta;
    let dataset;
    try {
      const raw = document.getElementById('payload').textContent;
      const parsed = JSON.parse(raw);
      meta = parsed.meta;
      dataset = parsed.dataset;
    } catch (err) {
      showError('データの読み込みに失敗しました。\\n' + (err && err.message ? err.message : String(err)));
      throw err;
    }

    let stationId = 1;
    let dayCategory = 'weekday';
    let timePreset = 'slot_1020';
    let layers = {};
    let pxPerMinute = 8;
    let overlayMode = 'capacity';
    const chartHeight = 300;

    function key() {
      return `${stationId}:${dayCategory}:${timePreset}`;
    }

    function data() {
      return dataset[key()];
    }

    function renderMetrics() {
      const d = data();
      const s = d.stats;
      const extra = s.extraTrainCount > 0
        ? `<span class="peak">+${s.extraTrainCount}</span><span style="font-size:0.65rem;color:var(--muted)">（臨時）</span>`
        : '';
      document.getElementById('metrics').innerHTML = `
        <div><div class="metric-val">¥${s.peakFare.toLocaleString('ja-JP')}</div>
          <div class="metric-lbl">最高運賃（${s.peakFareExitName}）</div></div>
        <div><div class="metric-val peak">${s.peakTime}</div>
          <div class="metric-lbl">ピーク時刻</div></div>
        <div><div class="metric-val">${s.arrivalEventCount}${extra}</div>
          <div class="metric-lbl">到着イベント数</div></div>`;
      document.getElementById('subtitle').textContent =
        `${d.stationName} · ${d.startTime}–${d.endTime} · 1分ごと max(運賃)`;
    }

    function renderBanner() {
      const el = document.getElementById('airport-banner');
      const highlights = data().airportHighlights || [];
      if (!highlights.length) {
        el.hidden = true;
        return;
      }
      const counts = {};
      const colors = {};
      for (const h of highlights) {
        counts[h.origin] = (counts[h.origin] || 0) + 1;
        if (!colors[h.origin]) colors[h.origin] = [];
        if (!colors[h.origin].includes(h.markerColor)) colors[h.origin].push(h.markerColor);
      }
      const labels = { narita: '成田', haneda: '羽田' };
      const items = Object.keys(counts).map((origin) => {
        const dots = colors[origin].map((c) =>
          `<span class="banner-dot" style="background:${c}"></span>`).join('');
        return `<span class="banner-item">${dots} ${labels[origin]} ${counts[origin]}本</span>`;
      }).join('');
      el.hidden = false;
      el.innerHTML = `<div class="banner-title">空港便（表示域）</div>
        <div class="banner-row">${items}</div>
        <div style="font-size:0.7rem;color:var(--muted);margin-top:6px">縦線は到着出口の色</div>`;
    }

    function renderPresetSelect() {
      const el = document.getElementById('preset-select');
      el.innerHTML = meta.presetOptions.map((opt) =>
        `<option value="${opt.id}"${opt.id === timePreset ? ' selected' : ''}>${opt.label}</option>`
      ).join('');
      el.onchange = () => {
        timePreset = el.value;
        renderAll();
      };
    }

    function renderOverlayRow() {
      const modes = [
        ['off', 'なし'],
        ['capacity', '収容'],
        ['trainCount', '本数'],
      ];
      const el = document.getElementById('overlay-row');
      el.innerHTML = '<span style="color:var(--muted);margin-right:4px">破線</span>' +
        modes.map(([mode, label]) =>
          `<button type="button" class="overlay-chip${overlayMode === mode ? ' on' : ''}" data-mode="${mode}">${label}</button>`
        ).join('');
      el.querySelectorAll('.overlay-chip').forEach((btn) => {
        btn.onclick = () => {
          overlayMode = btn.dataset.mode;
          renderOverlayRow();
          renderChart();
        };
      });
    }

    function computeExitPeaks(d) {
      return d.exits
        .filter((exit) => layers[exit.exitId] !== false)
        .map((exit) => {
          let peakFare = 0;
          let peakIdx = 0;
          exit.fareByMinute.forEach((fare, i) => {
            if (fare > peakFare) { peakFare = fare; peakIdx = i; }
          });
          return {
            exitId: exit.exitId,
            exitName: exit.exitName,
            color: exit.color,
            peakFare,
            peakTime: d.timeLabels[peakIdx] || '--:--',
          };
        })
        .sort((a, b) => b.peakFare - a.peakFare);
    }

    function renderExitPeaks() {
      const el = document.getElementById('exit-peaks');
      if (!timePreset.startsWith('slot_')) {
        el.hidden = true;
        return;
      }
      const d = data();
      const peaks = computeExitPeaks(d);
      const label = meta.presetOptions.find((o) => o.id === timePreset)?.label || '';
      el.hidden = false;
      el.innerHTML = `<div class="exit-peaks-title">出口別ピーク（${label}）</div>
        <div class="exit-peaks-grid">${peaks.map((p) =>
          `<div class="exit-peak-item">
            <div><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${p.color};margin-right:4px"></span>${p.exitName}</div>
            <div class="exit-peak-time">${p.peakTime}</div>
            <div class="exit-peak-fare">¥${p.peakFare.toLocaleString('ja-JP')}</div>
          </div>`).join('')}</div>`;
    }

    function renderChips() {
      const mk = (containerId, items, current, onPick) => {
        const el = document.getElementById(containerId);
        el.innerHTML = items.map(([value, label]) =>
          `<button type="button" class="chip${value === current ? ' on' : ''}" data-v="${value}">${label}</button>`
        ).join('');
        el.querySelectorAll('.chip').forEach((btn) => {
          btn.onclick = () => onPick(btn.dataset.v);
        });
      };
      mk('station-chips', meta.stations.map((s) => [String(s.id), s.name]), String(stationId), (v) => {
        stationId = Number(v);
        initLayers();
        renderAll();
      });
      mk('day-chips', Object.entries(meta.dayLabels), dayCategory, (v) => {
        dayCategory = v;
        renderAll();
      });
    }

    function initLayers() {
      layers = {};
      for (const exit of data().exits) layers[exit.exitId] = true;
    }

    function renderLegend() {
      const el = document.getElementById('legend');
      el.innerHTML = data().exits.map((exit) => {
        const on = layers[exit.exitId] !== false;
        return `<div class="legend-item${on ? '' : ' off'}" data-id="${exit.exitId}">
          <span class="dot" style="border-color:${exit.color};background:${on ? exit.color : 'transparent'}"></span>
          ${exit.exitName}</div>`;
      }).join('');
      el.querySelectorAll('.legend-item').forEach((item) => {
        item.onclick = () => {
          const id = item.dataset.id;
          layers[id] = !layers[id];
          renderLegend();
          renderChart();
          renderExitPeaks();
        };
      });
    }

    function renderChart() {
      try {
        const d = data();
        if (!d) {
          showError('データが見つかりません: ' + key());
          return;
        }
        const colors = themeColors();
        const slotCount = d.slotCount;
        pxPerMinute = slotCount > 480 ? 3 : slotCount > 240 ? 4 : slotCount > 120 ? 6 : 8;
        const chartWidth = Math.max(slotCount * pxPerMinute, 320);
        const padL = 48;
        const padR = overlayMode !== 'off' ? 44 : 12;
        const padT = 20;
        const padB = 32;
        const plotW = chartWidth - padL - padR;
        const plotH = chartHeight - padT - padB;

        const visible = d.exits.filter((e) => layers[e.exitId] !== false);
        let fareMax = 310;
        for (const exit of visible) {
          fareMax = seriesMax(exit.fareByMinute, fareMax);
        }
        const overlayData = overlayMode === 'trainCount'
          ? d.trainCountByMinute
          : d.totalCapacityByMinute;
        const capMax = seriesMax(overlayData, 1);
        const sampleIdx = pickIndices(slotCount, 500);

        const xAt = (i) => padL + (i / Math.max(slotCount - 1, 1)) * plotW;
        const yFare = (v) => padT + plotH - (v / fareMax) * plotH;
        const yCap = (v) => padT + plotH - (v / capMax) * plotH;

        let svg = `<svg width="${chartWidth}" height="${chartHeight}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="運賃波形">`;
        svg += `<rect x="${padL}" y="${padT}" width="${plotW}" height="${plotH}" fill="${colors.plotFill}" stroke="${colors.border}"/>`;

        for (let t = 0; t <= 1; t += 0.25) {
          const y = padT + plotH * (1 - t);
          svg += `<line x1="${padL}" y1="${y}" x2="${padL + plotW}" y2="${y}" stroke="${colors.border}" stroke-width="1"/>`;
          svg += `<text x="${padL - 6}" y="${y + 3}" text-anchor="end" fill="${colors.muted}" font-size="9">${Math.round(fareMax * t)}</text>`;
        }

        if (overlayMode !== 'off') {
          const capPts = buildPolylinePoints(overlayData, xAt, yCap, sampleIdx);
          svg += `<polyline fill="none" stroke="${colors.muted}" stroke-width="1" stroke-dasharray="4,4" opacity="0.55" points="${capPts}"/>`;
        }

        for (const exit of visible) {
          const pts = buildPolylinePoints(exit.fareByMinute, xAt, yFare, sampleIdx);
          svg += `<polyline fill="none" stroke="${exit.color}" stroke-width="2" points="${pts}"/>`;
        }

        for (const h of d.airportHighlights || []) {
          const x = xAt(h.minuteIndex);
          svg += `<line x1="${x}" y1="${padT}" x2="${x}" y2="${padT + plotH}" stroke="${h.markerColor}" stroke-width="1" stroke-dasharray="3,4" opacity="0.35"/>`;
          svg += `<circle cx="${x}" cy="${padT - 5}" r="4" fill="${h.markerColor}"/>`;
          svg += `<text x="${x}" y="${padT - 10}" text-anchor="middle" fill="${h.markerColor}" font-size="8" font-weight="700">${h.shortLabel}</text>`;
        }

        const step = slotCount > 240 ? 60 : slotCount > 120 ? 30 : pxPerMinute >= 10 ? 10 : 15;
        for (let i = 0; i < slotCount; i += step) {
          const x = xAt(i);
          svg += `<text x="${x}" y="${padT + plotH + 14}" text-anchor="middle" fill="${colors.muted}" font-size="9">${d.timeLabels[i]}</text>`;
        }

        svg += `<text x="8" y="${padT + plotH / 2}" fill="${colors.muted}" font-size="9" transform="rotate(-90 8 ${padT + plotH / 2})" text-anchor="middle">運賃</text>`;
        svg += '</svg>';
        document.getElementById('chart-scroll').innerHTML = svg;
        document.getElementById('error-box').hidden = true;
      } catch (err) {
        showError('グラフ描画エラー:\\n' + (err && err.message ? err.message : String(err)));
      }
    }

    function renderAll() {
      try {
        if (!dataset[key()]) {
          showError('データが見つかりません: ' + key());
          return;
        }
        if (!Object.keys(layers).length) initLayers();
        renderMetrics();
        renderBanner();
        renderChips();
        renderPresetSelect();
        renderOverlayRow();
        renderLegend();
        renderChart();
        renderExitPeaks();
      } catch (err) {
        showError('表示エラー:\\n' + (err && err.message ? err.message : String(err)));
      }
    }

    renderAll();
  </script>
</body>
</html>
